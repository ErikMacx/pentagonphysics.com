<svg viewBox="0 0 680 290" xmlns="http://www.w3.org/2000/svg" font-family="Cambria, serif">
  <rect width="680" height="290" fill="#ffffff"/>
  
  <text x="340" y="22" text-anchor="middle" fill="#000000" font-size="14" font-weight="bold">Figure 4. The Impedance Cage</text>
  <text x="340" y="40" text-anchor="middle" fill="#666666" font-size="10">G = α¹⁸ × 12/7: electromagnetism screened through 18 orthogonal modes</text>
  
  <!-- Left arrow -->
  <text x="32" y="155" text-anchor="middle" fill="#000000" font-size="10" font-weight="bold" transform="rotate(-90,32,155)">EM (α)</text>
  <line x1="55" y1="155" x2="80" y2="155" stroke="#000000" stroke-width="1.5" marker-end="url(#arwR)"/>
  
  <!-- Right arrow -->
  <line x1="598" y1="155" x2="623" y2="155" stroke="#000000" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arwR)"/>
  <text x="648" y="155" text-anchor="middle" fill="#000000" font-size="10" font-weight="bold" transform="rotate(-90,648,155)">gravity (α¹⁸×12/7)</text>
  
  <defs><marker id="arwR" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#000000" stroke-width="0.8"/></marker></defs>
  
  <!-- Stage labels -->
  <text x="225" y="62" text-anchor="middle" fill="#000000" font-size="11" font-weight="bold">ρ₄  (colour)</text>
  <text x="455" y="62" text-anchor="middle" fill="#000000" font-size="11" font-weight="bold">ρ₅  (anti-colour)</text>
  
  <!-- Gen labels -->
  <text x="92" y="102" fill="#888888" font-size="9">gen 1</text>
  <text x="92" y="155" fill="#888888" font-size="9">gen 2</text>
  <text x="92" y="208" fill="#888888" font-size="9">gen 3</text>
  
  <!-- Stage 1 bars -->
  <g>
    <rect x="140" y="80" width="50" height="20" rx="2" fill="#ffffff" stroke="#000000" stroke-width="1.2"/>
    <text x="165" y="94" text-anchor="middle" fill="#000000" font-size="9" font-style="italic">α</text>
    <rect x="200" y="80" width="50" height="20" rx="2" fill="#dddddd" stroke="#000000" stroke-width="1.2"/>
    <text x="225" y="94" text-anchor="middle" fill="#000000" font-size="9" font-style="italic">α</text>
    <rect x="260" y="80" width="50" height="20" rx="2" fill="#bbbbbb" stroke="#000000" stroke-width="1.2"/>
    <text x="285" y="94" text-anchor="middle" fill="#000000" font-size="9" font-style="italic">α</text>
    
    <rect x="140" y="133" width="50" height="20" rx="2" fill="#ffffff" stroke="#000000" stroke-width="1.2"/>
    <text x="165" y="147" text-anchor="middle" fill="#000000" font-size="9" font-style="italic">α</text>
    <rect x="200" y="133" width="50" height="20" rx="2" fill="#dddddd" stroke="#000000" stroke-width="1.2"/>
    <text x="225" y="147" text-anchor="middle" fill="#000000" font-size="9" font-style="italic">α</text>
    <rect x="260" y="133" width="50" height="20" rx="2" fill="#bbbbbb" stroke="#000000" stroke-width="1.2"/>
    <text x="285" y="147" text-anchor="middle" fill="#000000" font-size="9" font-style="italic">α</text>
    
    <rect x="140" y="186" width="50" height="20" rx="2" fill="#ffffff" stroke="#000000" stroke-width="1.2"/>
    <text x="165" y="200" text-anchor="middle" fill="#000000" font-size="9" font-style="italic">α</text>
    <rect x="200" y="186" width="50" height="20" rx="2" fill="#dddddd" stroke="#000000" stroke-width="1.2"/>
    <text x="225" y="200" text-anchor="middle" fill="#000000" font-size="9" font-style="italic">α</text>
    <rect x="260" y="186" width="50" height="20" rx="2" fill="#bbbbbb" stroke="#000000" stroke-width="1.2"/>
    <text x="285" y="200" text-anchor="middle" fill="#000000" font-size="9" font-style="italic">α</text>
  </g>
  
  <!-- Stage 2 bars -->
  <g>
    <rect x="370" y="80" width="50" height="20" rx="2" fill="#ffffff" stroke="#000000" stroke-width="1.2"/>
    <text x="395" y="94" text-anchor="middle" fill="#000000" font-size="9" font-style="italic">α</text>
    <rect x="430" y="80" width="50" height="20" rx="2" fill="#dddddd" stroke="#000000" stroke-width="1.2"/>
    <text x="455" y="94" text-anchor="middle" fill="#000000" font-size="9" font-style="italic">α</text>
    <rect x="490" y="80" width="50" height="20" rx="2" fill="#bbbbbb" stroke="#000000" stroke-width="1.2"/>
    <text x="515" y="94" text-anchor="middle" fill="#000000" font-size="9" font-style="italic">α</text>
    
    <rect x="370" y="133" width="50" height="20" rx="2" fill="#ffffff" stroke="#000000" stroke-width="1.2"/>
    <text x="395" y="147" text-anchor="middle" fill="#000000" font-size="9" font-style="italic">α</text>
    <rect x="430" y="133" width="50" height="20" rx="2" fill="#dddddd" stroke="#000000" stroke-width="1.2"/>
    <text x="455" y="147" text-anchor="middle" fill="#000000" font-size="9" font-style="italic">α</text>
    <rect x="490" y="133" width="50" height="20" rx="2" fill="#bbbbbb" stroke="#000000" stroke-width="1.2"/>
    <text x="515" y="147" text-anchor="middle" fill="#000000" font-size="9" font-style="italic">α</text>
    
    <rect x="370" y="186" width="50" height="20" rx="2" fill="#ffffff" stroke="#000000" stroke-width="1.2"/>
    <text x="395" y="200" text-anchor="middle" fill="#000000" font-size="9" font-style="italic">α</text>
    <rect x="430" y="186" width="50" height="20" rx="2" fill="#dddddd" stroke="#000000" stroke-width="1.2"/>
    <text x="455" y="200" text-anchor="middle" fill="#000000" font-size="9" font-style="italic">α</text>
    <rect x="490" y="186" width="50" height="20" rx="2" fill="#bbbbbb" stroke="#000000" stroke-width="1.2"/>
    <text x="515" y="200" text-anchor="middle" fill="#000000" font-size="9" font-style="italic">α</text>
  </g>
  
  <!-- Bracket labels -->
  <text x="225" y="230" text-anchor="middle" fill="#000000" font-size="10">9 modes</text>
  <text x="455" y="230" text-anchor="middle" fill="#000000" font-size="10">9 modes</text>
  
  <!-- Arrow between stages -->
  <line x1="325" y1="143" x2="355" y2="143" stroke="#000000" stroke-width="1" marker-end="url(#arwR)"/>
  
  <!-- Colour legend for bars -->
  <rect x="140" y="248" width="12" height="12" fill="#ffffff" stroke="#000000" stroke-width="1"/>
  <text x="158" y="259" fill="#000000" font-size="9">colour 1</text>
  <rect x="220" y="248" width="12" height="12" fill="#dddddd" stroke="#000000" stroke-width="1"/>
  <text x="238" y="259" fill="#000000" font-size="9">colour 2</text>
  <rect x="300" y="248" width="12" height="12" fill="#bbbbbb" stroke="#000000" stroke-width="1"/>
  <text x="318" y="259" fill="#000000" font-size="9">colour 3</text>
  
  <!-- Equation -->
  <text x="340" y="278" text-anchor="middle" fill="#000000" font-size="12">3 colours  ×  3 generations  ×  2 chiralities  =  18</text>
</svg>
