<svg viewBox="0 0 520 330" xmlns="http://www.w3.org/2000/svg" font-family="Cambria, serif">
  <rect width="520" height="330" fill="#ffffff"/>
  
  <text x="260" y="25" text-anchor="middle" fill="#000000" font-size="14" font-weight="bold">Figure 2. E₈ Propagator at z = φ</text>
  <text x="260" y="42" text-anchor="middle" fill="#666666" font-size="10">Coupling strengths between boundary fermions and key sectors</text>
  
  <!-- Headers -->
  <text x="220" y="80" text-anchor="middle" fill="#000000" font-size="12" font-weight="bold">colour (ρ₄)</text>
  <text x="340" y="80" text-anchor="middle" fill="#000000" font-size="12" font-weight="bold">EW (ρ₇)</text>
  <text x="455" y="80" text-anchor="middle" fill="#000000" font-size="12" font-weight="bold">Higgs (ρ₈)</text>
  
  <text x="90" y="140" text-anchor="middle" fill="#000000" font-size="12" font-weight="bold">quark (ρ₂)</text>
  <text x="90" y="220" text-anchor="middle" fill="#000000" font-size="12" font-weight="bold">lepton (ρ₃)</text>
  
  <!-- Grid -->
  <g stroke="#000000" stroke-width="1">
    <line x1="150" y1="90" x2="500" y2="90"/>
    <line x1="150" y1="170" x2="500" y2="170"/>
    <line x1="150" y1="250" x2="500" y2="250"/>
    <line x1="150" y1="90" x2="150" y2="250"/>
    <line x1="280" y1="90" x2="280" y2="250"/>
    <line x1="395" y1="90" x2="395" y2="250"/>
    <line x1="500" y1="90" x2="500" y2="250"/>
  </g>
  
  <!-- Quark row -->
  <text x="215" y="130" text-anchor="middle" fill="#000000" font-size="18" font-weight="bold" font-style="italic">2φ</text>
  <text x="215" y="152" text-anchor="middle" fill="#888888" font-size="10">(3.236)</text>
  <text x="337" y="130" text-anchor="middle" fill="#000000" font-size="18" font-weight="bold" font-style="italic">−φ²</text>
  <text x="337" y="152" text-anchor="middle" fill="#888888" font-size="10">(−2.618)</text>
  <text x="447" y="130" text-anchor="middle" fill="#000000" font-size="18" font-weight="bold" font-style="italic">−φ</text>
  <text x="447" y="152" text-anchor="middle" fill="#888888" font-size="10">(−1.618)</text>
  
  <!-- Lepton row -->
  <text x="215" y="210" text-anchor="middle" fill="#000000" font-size="18" font-weight="bold" font-style="italic">−φ</text>
  <text x="215" y="232" text-anchor="middle" fill="#888888" font-size="10">(−1.618)</text>
  <text x="337" y="210" text-anchor="middle" fill="#000000" font-size="18" font-weight="bold" font-style="italic">φ</text>
  <text x="337" y="232" text-anchor="middle" fill="#888888" font-size="10">(1.618)</text>
  
  <!-- THE ZERO - bold box -->
  <text x="447" y="217" text-anchor="middle" fill="#000000" font-size="24" font-weight="bold">0</text>
  <rect x="418" y="190" width="58" height="45" fill="none" stroke="#000000" stroke-width="2.5" rx="3"/>
  
  <!-- Ratios -->
  <text x="215" y="278" text-anchor="middle" fill="#000000" font-size="11">|ratio| = 2</text>
  <text x="337" y="278" text-anchor="middle" fill="#000000" font-size="11" font-style="italic">|ratio| = φ</text>
  <text x="447" y="278" text-anchor="middle" fill="#000000" font-size="11">exact zero</text>
  
  <!-- Bottom -->
  <text x="260" y="310" text-anchor="middle" fill="#444444" font-size="10">The 2 gives α_s = φ⁻³/2.  The 0 gives singlet emergence.  All entries are exact.</text>
</svg>
